name: Psihoterapija Ikar CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build And Push Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      short_sha: ${{ steps.vars.outputs.short_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Validate Astro DB secrets
        env:
          ASTRO_DB_REMOTE_URL: ${{ secrets.ASTRO_DB_REMOTE_URL }}
          ASTRO_DB_APP_TOKEN: ${{ secrets.ASTRO_DB_APP_TOKEN }}
        run: |
          set -euo pipefail

          : "${ASTRO_DB_REMOTE_URL:?Missing ASTRO_DB_REMOTE_URL secret}"
          : "${ASTRO_DB_APP_TOKEN:?Missing ASTRO_DB_APP_TOKEN secret}"

          node -e '
            const value = process.env.ASTRO_DB_REMOTE_URL;
            try {
              const url = new URL(value);
              const allowedProtocols = new Set(["libsql:", "http:", "https:", "ws:", "wss:", "file:", "memory:"]);
              if (!allowedProtocols.has(url.protocol)) {
                throw new Error(`Unsupported protocol: ${url.protocol}`);
              }
            } catch (error) {
              console.error("Invalid ASTRO_DB_REMOTE_URL secret.");
              console.error("Expected a libSQL-compatible URL such as:");
              console.error("  libsql://your-database.turso.io");
              console.error("  https://your-libsql-host");
              console.error(`Received: ${JSON.stringify(value)}`);
              console.error(error instanceof Error ? error.message : String(error));
              process.exit(1);
            }
          '

      - name: Push Astro DB schema
        run: npx astro db push --remote
        env:
          ASTRO_DB_REMOTE_URL: ${{ secrets.ASTRO_DB_REMOTE_URL }}
          ASTRO_DB_APP_TOKEN: ${{ secrets.ASTRO_DB_APP_TOKEN }}

      - name: Compute vars
        id: vars
        shell: bash
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main-${{ steps.vars.outputs.short_sha }}
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PUBLIC_SITE_URL=${{ vars.PUBLIC_SITE_URL || 'https://psihoterapija-ikar.rs' }}
            ASTRO_DB_REMOTE_URL=${{ secrets.ASTRO_DB_REMOTE_URL }}
          secrets: |
            ASTRO_DB_APP_TOKEN=${{ secrets.ASTRO_DB_APP_TOKEN }}

  deploy:
    name: Deploy To Kubernetes
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy Kubernetes manifests to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST || '159.195.22.165' }}
          username: ${{ secrets.SERVER_USER || 'root' }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "k8s/"
          target: "/opt/psihoterapija-ikar"

      - name: Deploy to Kubernetes
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST || '159.195.22.165' }}
          username: ${{ secrets.SERVER_USER || 'root' }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: REGISTRY,IMAGE_NAME,DIGEST,SHORT_SHA,PUBLIC_SITE_URL,UPLOADS_DIR,ASTRO_DB_REMOTE_URL,ASTRO_DB_APP_TOKEN,ADMIN_PASSWORD,ADMIN_SESSION_SECRET,GHCR_USERNAME,GHCR_PAT
          script: |
            set -euo pipefail

            cd /opt/psihoterapija-ikar

            FULL_IMAGE="${REGISTRY}/${IMAGE_NAME}@${DIGEST}"

            : "${ADMIN_PASSWORD:?Missing ADMIN_PASSWORD secret}"
            : "${ADMIN_SESSION_SECRET:?Missing ADMIN_SESSION_SECRET secret}"
            : "${ASTRO_DB_REMOTE_URL:?Missing ASTRO_DB_REMOTE_URL secret}"
            : "${ASTRO_DB_APP_TOKEN:?Missing ASTRO_DB_APP_TOKEN secret}"

            : "${PUBLIC_SITE_URL:=https://psihoterapija-ikar.rs}"
            : "${UPLOADS_DIR:=/app/data/uploads}"

            echo "Deploying psihoterapija-ikar with image: ${FULL_IMAGE}"

            kubectl create namespace prod --dry-run=client -o yaml | kubectl apply -f -

            if [ -n "${GHCR_PAT:-}" ] && [ -n "${GHCR_USERNAME:-}" ]; then
              kubectl create secret docker-registry ghcr-secret \
                --docker-server="${REGISTRY}" \
                --docker-username="${GHCR_USERNAME}" \
                --docker-password="${GHCR_PAT}" \
                --namespace prod \
                --dry-run=client -o yaml | kubectl apply -f -
            elif ! kubectl get secret ghcr-secret -n prod >/dev/null 2>&1; then
              echo "Missing ghcr-secret in namespace prod."
              echo "Set GHCR_USERNAME and GHCR_PAT GitHub secrets or create ghcr-secret manually."
              exit 1
            fi

            kubectl apply -k k8s/

            kubectl create configmap psihoterapija-ikar-config \
              --from-literal=NODE_ENV=production \
              --from-literal=HOST=0.0.0.0 \
              --from-literal=PORT=3000 \
              --from-literal=PUBLIC_SITE_URL="${PUBLIC_SITE_URL}" \
              --from-literal=UPLOADS_DIR="${UPLOADS_DIR}" \
              -n prod \
              --dry-run=client -o yaml | kubectl apply -f -

            kubectl create secret generic psihoterapija-ikar-secrets \
              --from-literal=astro-db-remote-url="${ASTRO_DB_REMOTE_URL}" \
              --from-literal=astro-db-app-token="${ASTRO_DB_APP_TOKEN}" \
              --from-literal=admin-password="${ADMIN_PASSWORD}" \
              --from-literal=admin-session-secret="${ADMIN_SESSION_SECRET}" \
              -n prod \
              --dry-run=client -o yaml | kubectl apply -f -

            kubectl set image deployment/psihoterapija-ikar psihoterapija-ikar="${FULL_IMAGE}" -n prod

            echo "Waiting for deployment to become ready..."
            if ! kubectl rollout status deployment/psihoterapija-ikar -n prod --timeout=300s; then
              echo "Rollout failed. Pod diagnostics:"
              kubectl get pods -n prod -l app=psihoterapija-ikar -o wide || true
              for pod in $(kubectl get pods -n prod -l app=psihoterapija-ikar -o jsonpath='{.items[*].metadata.name}'); do
                echo "--- ${pod} events ---"
                kubectl describe pod "${pod}" -n prod | sed -n '/Events:/,$p' || true
              done

              echo "Attempting automatic rollback..."
              kubectl rollout undo deployment/psihoterapija-ikar -n prod || true

              if kubectl rollout status deployment/psihoterapija-ikar -n prod --timeout=180s; then
                echo "Rollback completed. Previous healthy version restored."
              else
                echo "Rollback did not recover the deployment."
                kubectl get pods -n prod -l app=psihoterapija-ikar -o wide || true
              fi

              exit 1
            fi

            echo "Deployment status:"
            kubectl get pods -n prod -l app=psihoterapija-ikar
            kubectl get svc psihoterapija-ikar -n prod
            kubectl get ingress psihoterapija-ikar-ingress -n prod || true
            kubectl get pvc psihoterapija-ikar-data -n prod || true

            echo "Deployment completed successfully."
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DIGEST: ${{ needs.build-and-push.outputs.digest }}
          SHORT_SHA: ${{ needs.build-and-push.outputs.short_sha }}
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
          UPLOADS_DIR: ${{ vars.UPLOADS_DIR }}
          ASTRO_DB_REMOTE_URL: ${{ secrets.ASTRO_DB_REMOTE_URL }}
          ASTRO_DB_APP_TOKEN: ${{ secrets.ASTRO_DB_APP_TOKEN }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
