  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

labels:
  - pairs:
      app.kubernetes.io/name: psihoterapija-ikar
      app.kubernetes.io/managed-by: kustomize
      environment: prod

images:
  - name: ghcr.io/milos-mucic/psihoterapija
    newTag: latest
